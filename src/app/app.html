<div class="flex flex-col-reverse xl:flex-row min-h-screen w-full items-center xl:items-start justify-center bg-retro-400 p-2 sm:p-4 md:p-8 font-serif overflow-x-hidden relative">

  <main class="z-10 w-full max-w-5xl border-4 border-retro-500 shadow-[8px_8px_0px_0px_var(--color-retro-500)] ring-4 ring-retro-500 overflow-hidden">
    <div class="flex flex-col font-serif text-retro-500 gap-4 bg-gradient-to-l from-retro-300 to-retro-400 p-10 min-h-full relative bg-dither overflow-hidden">
      <div class="relative z-10">
          <router-outlet></router-outlet> 
      </div>
    </div>
  </main>

  <nav class="block xl:hidden w-full mb-4 z-20">
    <ul class="flex flex-row gap-2 sm:gap-4 flex-wrap justify-center">
      <li>
        <a routerLink="/" 
           routerLinkActive="!bg-retro-100 !text-retro-500 translate-x-[4px] translate-y-[4px] !shadow-none"
           [routerLinkActiveOptions]="{ exact: true }"
           class="block border-[3px] border-retro-500 bg-retro-400 px-4 py-2 text-humo text-sm transition-all duration-200 rounded-sm shadow-[4px_4px_0px_0px_var(--color-retro-500)] hover:bg-retro-100 hover:text-retro-500 hover:shadow-none hover:translate-x-[4px] hover:translate-y-[4px] text-center">
           Información
        </a>
      </li>
      <li>
        <a routerLink="/experiencia" 
           routerLinkActive="!bg-retro-100 !text-retro-500 translate-x-[4px] translate-y-[4px] !shadow-none"
           class="block border-[3px] border-retro-500 bg-retro-300 px-4 py-2 text-humo text-sm transition-all duration-200 rounded-sm shadow-[4px_4px_0px_0px_var(--color-retro-500)] hover:bg-retro-100 hover:text-retro-500 hover:shadow-none hover:translate-x-[4px] hover:translate-y-[4px] text-center">
           Experiencia
        </a>
      </li>
      <li>
        <a routerLink="/proyectos" 
           routerLinkActive="!bg-retro-100 !text-retro-500 translate-x-[4px] translate-y-[4px] !shadow-none"
           class="block border-[3px] border-retro-500 bg-retro-400 px-4 py-2 text-retro-50 text-sm transition-all duration-200 rounded-sm shadow-[4px_4px_0px_0px_var(--color-retro-500)] hover:bg-retro-100 hover:text-retro-500 hover:shadow-none hover:translate-x-[4px] hover:translate-y-[4px] text-center">
           Proyectos
        </a>
      </li>
    </ul>
  </nav>

  <nav class="hidden xl:block ml-[-4px] self-start mt-8">
    <ul class="flex flex-col gap-5">
      <li>
        <a routerLink="/" 
           routerLinkActive="!bg-retro-100 !text-retro-500 pl-10 translate-x-[4px] translate-y-[4px] !shadow-none"
           [routerLinkActiveOptions]="{ exact: true }"
           class="block border-[3px] border-l-0 border-retro-500 bg-retro-400 px-6 py-3 text-humo transition-all duration-200 rounded-r-sm shadow-[4px_4px_0px_0px_var(--color-retro-500)] hover:bg-retro-100 hover:text-retro-500 hover:shadow-none hover:translate-x-[4px] hover:translate-y-[4px]">
           Información
        </a>
      </li>
      <li>
        <a routerLink="/experiencia" 
           routerLinkActive="!bg-retro-100 !text-retro-500 pl-10 translate-x-[4px] translate-y-[4px] !shadow-none"
           class="block border-[3px] border-l-0 border-retro-500 bg-retro-300 px-6 py-3 text-humo transition-all duration-200 rounded-r-sm shadow-[4px_4px_0px_0px_var(--color-retro-500)] hover:bg-retro-100 hover:text-retro-500 hover:shadow-none hover:translate-x-[4px] hover:translate-y-[4px]">
           Experiencia
        </a>
      </li>
      <li>
        <a routerLink="/proyectos" 
           routerLinkActive="!bg-retro-100 !text-retro-500 pl-10 translate-x-[4px] translate-y-[4px] !shadow-none"
           class="block border-[3px] border-l-0 border-retro-500 bg-retro-400 px-6 py-3 text-retro-50 transition-all duration-200 rounded-r-sm shadow-[4px_4px_0px_0px_var(--color-retro-500)] hover:bg-retro-100 hover:text-retro-500 hover:shadow-none hover:translate-x-[4px] hover:translate-y-[4px]">
           Proyectos
        </a>
      </li>
    </ul>
  </nav>

 @for (slime of activeSlimes(); track slime.id) {
    <div 
      [style.animation-duration]="slime.speed + 's'"
      [ngClass]="{ 'parent-dead': slime.state === 'dead' }"
      class="slime-wrapper">
      
      <div 
        (click)="squishSlime(slime.id)"
        [style.animation-duration]="'0.5s'"
        [style.background-image]="'url(slime_animation.png)'"
        [ngClass]="{ 'child-dead': slime.state === 'dead' }"
        class="slime-visual">
      </div>

    </div>
  }
</div>
